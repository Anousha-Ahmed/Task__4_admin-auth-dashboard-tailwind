<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-600 via-indigo-600 to-purple-700 p-4">

<div class="bg-white w-full max-w-md rounded-3xl shadow-2xl p-8">

    <div class="text-center mb-6">
        <h1 class="text-3xl font-bold text-gray-800">
            Welcome Back
        </h1>

        <p class="text-gray-500 mt-2">
            Login to your account
        </p>
    </div>

    <form id="loginForm">
        <input type="email" id="email" placeholder="Email Address" class="w-full border border-gray-300 rounded-xl px-4 py-3 mb-4 outline-none focus:border-blue-500">
        <input type="password" id="password" placeholder="Password" class="w-full border border-gray-300 rounded-xl px-4 py-3 mb-4 outline-none focus:border-blue-500">
        <p id="error" class="text-red-500 text-sm mb-4 font-medium"></p>

        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-semibold transition duration-300">
            Login
        </button>
    </form>

    <p class="text-center mt-5 text-gray-500">Don't have an account?
        <a href="signup.html" class="text-blue-600 font-semibold">Signup</a>
    </p>

</div>

<script>

    const form = document.getElementById("loginForm");

    form.addEventListener("submit", (e) => {
        e.preventDefault();

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const error = document.getElementById("error");

        error.innerText = "";

        if (!email || !password) {
            error.innerText = "All fields are required";
            return;
        }

        const user = JSON.parse(localStorage.getItem("user") );

        if (!user) {
            error.innerText = "No user found. Please signup first.";
            return;
        }

        if (
            user.email === email &&
            user.password === password
        ) {

            user.isLoggedIn = true;

            localStorage.setItem("user",JSON.stringify(user));
            window.location.href = "dashboard.html";
        } else {
            error.innerText ="Invalid email or password";
        }

    });

</script>

</body>
</html>
