<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-600 via-indigo-600 to-purple-700 p-4">

<div class="bg-white w-full max-w-md rounded-3xl shadow-2xl p-8">

    <div class="text-center mb-6">
        <h1 class="text-3xl font-bold text-gray-800">
            Create Account
        </h1>

        <p class="text-gray-500 mt-2">
            Signup as Admin
        </p>
    </div>

    <form id="signupForm">

        <input type="text" id="firstName" name="firstName" placeholder="First Name" class="w-full border border-gray-300 rounded-xl px-4 py-3 mb-4 outline-none focus:border-blue-500">
        <input type="text" id="lastName"  name="lastName" placeholder="Last Name" class="w-full border border-gray-300 rounded-xl px-4 py-3 mb-4 outline-none focus:border-blue-500">
        <input type="email" id="email" name="email" placeholder="Email Address" class="w-full border border-gray-300 rounded-xl px-4 py-3 mb-4 outline-none focus:border-blue-500">
        <input type="password" name="password" id="password" placeholder="Password" class="w-full border border-gray-300 rounded-xl px-4 py-3 mb-4 outline-none focus:border-blue-500">
        <input type="password" name="confirmPassword" id="confirmPassword" placeholder="Confirm Password" class="w-full border border-gray-300 rounded-xl px-4 py-3 mb-4 outline-none focus:border-blue-500">

        <select id="role" name="role" class="w-full border border-gray-300 rounded-xl px-4 py-3 mb-4 outline-none focus:border-blue-600">
            <option value="admin">Admin</option>
        </select>

        <p id="error" class="text-red-500 text-sm mb-4 font-medium"></p>

        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-semibold transition duration-300">
            Signup
        </button>

    </form>

    <p class="text-center mt-5 text-gray-500">Already have an account?
        <a href="login.html" class="text-blue-600 font-semibold">Login</a>
    </p>

</div>

<script>

    const form = document.getElementById("signupForm");
    form.addEventListener("submit", (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const signUpData = Object.fromEntries(formData);

        const error = document.getElementById("error");
        error.innerText = "";

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        const passwordRegex = /^(?=.*[A-Za-z])(?=.*\d).{8,}$/;

        if (
            !signUpData.firstName ||
            !signUpData.lastName ||
            !signUpData.email ||
            !signUpData.password ||
            !signUpData.confirmPassword
        ) {
            error.innerText = "All fields are required";
            return;
        }

        if (!emailRegex.test(signUpData.email)) {
            error.innerText = "Enter valid email";
            return;
        }

        if (!passwordRegex.test(signUpData.password)) {
            error.innerText =
            "Password must contain minimum 8 characters and 1 number";
            return;
        }

        if (signUpData.password !== signUpData.confirmPassword) {
            error.innerText = "Passwords do not match";
            return;
        }
        
        delete signUpData.confirmPassword;
        signUpData.isLoggedIn = false;

        localStorage.setItem("user",JSON.stringify(signUpData)
        );
        window.location.href = "login.html";

    });

</script>

</body>
</html>
